name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer push to the same branch supersedes an in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # This workspace links ~300 test binaries. With debuginfo on, target/ measures
  # 68 GB locally; a clippy --all-targets pass followed by `cargo test --all`
  # exhausted the runner's 89 GB and died with "No space left on device" (which
  # surfaced misleadingly as `ld terminated with signal 7 [Bus error]` plus an
  # LLVM "please file a bug" banner). Debuginfo is the bulk of it: same suite,
  # same toolchain, debuginfo off => 5.0 GB. CI needs pass/fail, not debuggable
  # binaries. Panic messages survive; only symbolized backtraces are lost.
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  check:
    name: Check, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Reclaims ~25 GB of preinstalled toolchains this project never uses
      # (measured: 89 GB free -> 114 GB). Headroom, not the actual fix — the
      # debuginfo settings above are what brought target/ back under budget.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/local/share/powershell \
                      /usr/share/swift "$AGENT_TOOLSDIRECTORY"
          df -h /

      # SR-11: pin the toolchain. `rust-toolchain.toml` is the single source of
      # truth for the Rust version; read `channel` out of it here so CI installs
      # the exact toolchain a dev box does, instead of floating @stable to the
      # newest release (which turned CI red on new clippy lints with no commit).
      # dtolnay/rust-toolchain does NOT read rust-toolchain.toml, so we extract
      # the value and pass it explicitly via the generic action's `toolchain:`
      # input (the reason this is the `@master` action, not `@stable`).
      #
      # SR-32: pinned by commit SHA instead of the floating `@master` ref. A
      # third-party action ref that moves under us can change CI behaviour — or,
      # worse, be repointed maliciously — between runs with no commit here. The
      # SHA below is `master` as of 2026-06-30; bump it deliberately (and update
      # this comment's date) when a newer revision is wanted.
      - name: Read pinned toolchain
        id: toolchain
        run: |
          channel=$(grep -oP '^\s*channel\s*=\s*"\K[^"]+' rust-toolchain.toml)
          if [ -z "$channel" ]; then
            echo "::error file=rust-toolchain.toml::could not read [toolchain] channel"
            exit 1
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "Pinned toolchain: $channel"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master @ 2026-06-30
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          components: rustfmt, clippy

      # Fail loudly if the installed toolchain does not match the pin. This is the
      # machine gate the pin exists to provide: it catches a rustup resolution
      # surprise or a future edit that re-floats the version, rather than letting
      # CI silently run on a different compiler than every dev.
      - name: Verify toolchain matches the pin
        run: |
          expected="${{ steps.toolchain.outputs.channel }}"
          actual=$(rustc --version | awk '{print $2}')
          echo "expected=$expected actual=$actual"
          if [ "$expected" != "$actual" ]; then
            echo "::error::rustc is $actual but rust-toolchain.toml pins $expected"
            exit 1
          fi

      # Caches ~/.cargo and target/ with pruning; a raw actions/cache of target/
      # exceeds the 10 GB per-repo cache budget.
      #
      # SR-32: pinned by commit SHA instead of the floating `@v2` major-version
      # tag (same third-party-drift reasoning as the toolchain action above). The
      # SHA below is release v2.9.1; bump it and this comment together when moving
      # to a newer release.
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # SR-3 seal gate. GameState's fields are pub(crate); mutable access exists
      # only behind the engine's `test-util` feature, which its own tests/benches
      # enable via a self dev-dependency. Under --all-targets (clippy, and
      # `cargo test --all` below) cargo unifies features across the workspace, so
      # test-util is ON for every crate and those steps CANNOT catch a production
      # consumer (tui, replay-viewer, simulator, network) reaching for an escape
      # hatch. This step does not build dev-dependencies, so test-util is off and
      # such a consumer fails to compile. Do not drop it.
      - name: Build workspace (proves GameState stays sealed)
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --all
