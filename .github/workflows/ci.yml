name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer push to the same branch supersedes an in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # This workspace links ~300 test binaries. With debuginfo on, target/ is ~68 GB
  # locally — far past the ~14 GB free on ubuntu-latest, and the first CI run to
  # reach `cargo test` died with "No space left on device" (surfacing as
  # `ld terminated with signal 7 [Bus error]`). Debuginfo is the bulk of that, and
  # CI only needs pass/fail, not debuggable binaries. Panic messages survive; only
  # symbolized backtraces are lost.
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  check:
    name: Check, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Reclaims ~25 GB of preinstalled toolchains this project never uses.
      # Needed even with debuginfo off — the margin is otherwise uncomfortably thin.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/local/share/powershell \
                      /usr/share/swift "$AGENT_TOOLSDIRECTORY"
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Caches ~/.cargo and target/ with pruning; a raw actions/cache of target/
      # exceeds the 10 GB per-repo cache budget.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all
